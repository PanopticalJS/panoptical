test: Auto-healing Success Demo
description: Demonstrates successful auto-healing of selectors
steps:
  - goto: 'https://panoptical.dev/testing/test-page.html'
  - wait:
      selector: body
  
  # Example 1: Partial text that needs fuzzy matching
  # Selector 'Click' should heal to 'Click Me!' via fuzzy text matching
  - click: 'Click'
  
  # Fill input to test the result
  - fill:
      selector: '#demo-input'
      text: 'Testing auto-healing'
  
  - expect:
      selector: '#demo-output'
      text: 'Button clicked!'
